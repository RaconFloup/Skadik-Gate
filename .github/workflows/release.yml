name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: '1.0.1'

permissions:
  contents: write

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Build packages
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: build/ipk/*.ipk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: packages
        path: release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*.ipk
        generate_release_notes: true
        body: |
          ## Skadik-Gate ${{ env.VERSION }}

          ### Установка / Installation
          ```
          wget -O /tmp/install.sh https://raw.githubusercontent.com/RaconFloup/Skadik-Gate/main/install.sh
          chmod +x /tmp/install.sh
          /tmp/install.sh
          ```

          ### Пакеты / Packages
          Скачайте .ipk файлы из этого релиза и установите:
          ```
          opkg install /tmp/skadik-gate_*.ipk
          opkg install /tmp/luci-app-skadik-gate_*.ipk
          ```
