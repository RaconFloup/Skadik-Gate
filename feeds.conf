# Skadik-Gate Package Feed Configuration
# 
# This file contains the feed URL for Skadik-Gate packages.
# Add this to your OpenWRT router to receive automatic updates.
#
# Usage on router:
#   echo "src/gz skadik-gate https://raw.githubusercontent.com/RaconFloup/Skadik-Gate/gh-pages/x86_64" >> /etc/opkg/customfeeds.conf
#   opkg update
#   opkg install skadik-gate luci-app-skadik-gate

Feeds:
  skadik-gate:
    URL: https://raw.githubusercontent.com/RaconFloup/Skadik-Gate/gh-pages
    Architectures:
      - x86_64
      - aarch64_generic
      - arm_cortex-a7

Quick Setup:
  wget -O /tmp/add-feed.sh https://raw.githubusercontent.com/RaconFloup/Skadik-Gate/main/add-feed.sh
  sh /tmp/add-feed.sh
